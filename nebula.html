<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>COSM0S — Nebula Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    body { overflow: hidden; }
    .nebula-layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 1.5rem;
      height: calc(100vh - 56px);
      padding-top: 56px;
      overflow: hidden;
    }
    @media(max-width:700px){
      body { overflow: auto; }
      .nebula-layout { grid-template-columns:1fr; height:auto; padding: 56px 0 2rem; }
    }
    .canvas-wrap {
      position: relative;
      overflow: hidden;
      background: #000;
    }
    #nebulaCanvas { display:block; width:100%; height:100%; }
    .nebula-overlay {
      position: absolute; bottom: 1.2rem; left: 1.2rem; right: 1.2rem;
      display: flex; justify-content: space-between; align-items: flex-end; pointer-events: none;
    }
    .nebula-name-big {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.2rem,3vw,2rem);
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.8);
      text-shadow: 0 0 20px rgba(0,0,0,0.8);
      line-height: 1.1;
    }
    .nebula-coords {
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem;
      color: rgba(255,255,255,0.3);
      text-align: right;
      letter-spacing: 0.12em;
    }
    .gen-badge {
      position: absolute; top: 1rem; right: 1rem;
      font-family: 'Space Mono', monospace; font-size: 0.55rem;
      letter-spacing: 0.15em; color: rgba(255,255,255,0.25); text-transform: uppercase;
    }

    .sidebar {
      display: flex; flex-direction: column; gap: 1rem;
      padding: 1rem 1rem 1rem 0;
      overflow-y: auto;
    }
    @media(max-width:700px){ .sidebar { padding: 0 1rem 2rem; } }
    .sidebar-title {
      font-family: 'Space Mono', monospace; font-size: 0.55rem;
      letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase;
    }
    .ctrl-group { background: var(--dim); border: 1px solid var(--border); border-radius: 3px; padding: 1rem; }
    .ctrl-label {
      font-family: 'Space Mono', monospace; font-size: 0.55rem;
      letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.6rem; display: block;
    }
    .ctrl-row { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .ctrl-btn {
      font-family: 'Space Mono', monospace; font-size: 0.52rem; letter-spacing: 0.1em;
      padding: 0.3rem 0.6rem; background: transparent; border: 1px solid var(--border);
      color: var(--muted); cursor: pointer; border-radius: 2px; transition: all 0.15s;
    }
    .ctrl-btn:hover { color: var(--text); border-color: rgba(200,220,255,0.3); }
    .ctrl-btn.active { background: var(--accent); color: var(--void); border-color: var(--accent); }
    .slider-wrap { margin-top: 0.3rem; }
    .slider-wrap input[type=range] {
      -webkit-appearance: none; width: 100%; height: 2px;
      background: var(--border); border-radius: 1px; outline: none;
    }
    .slider-wrap input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
    }
    .slider-val { font-family: 'Space Mono', monospace; font-size: 0.55rem; color: var(--accent); margin-top: 0.3rem; }

    .big-gen-btn {
      width: 100%; padding: 1rem; background: var(--accent); color: var(--void);
      border: none; font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem;
      letter-spacing: 0.2em; cursor: pointer; border-radius: 2px; transition: all 0.2s;
    }
    .big-gen-btn:hover { box-shadow: 0 0 40px rgba(0,255,231,0.4); }
    .big-gen-btn:active { transform: scale(0.98); }

    .save-btn {
      width: 100%; padding: 0.6rem; background: transparent; color: var(--accent);
      border: 1px solid rgba(0,255,231,0.3); font-family: 'Space Mono', monospace;
      font-size: 0.6rem; letter-spacing: 0.15em; cursor: pointer; border-radius: 2px;
      text-transform: uppercase; transition: all 0.2s;
    }
    .save-btn:hover { background: rgba(0,255,231,0.06); }

    .nebula-stats { }
    .nstat { display: flex; justify-content: space-between; padding: 0.35rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .nsk { font-family: 'Space Mono', monospace; font-size: 0.55rem; color: var(--muted); text-transform: uppercase; }
    .nsv { font-family: 'Space Mono', monospace; font-size: 0.55rem; color: var(--text); }

    .type-palette {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 0.4rem;
    }
    .pal-swatch {
      height: 32px; border-radius: 2px; cursor: pointer; border: 1px solid transparent;
      transition: all 0.2s; position: relative;
    }
    .pal-swatch:hover { transform: scale(1.05); }
    .pal-swatch.active { border-color: rgba(255,255,255,0.6); box-shadow: 0 0 12px rgba(255,255,255,0.2); }
    .pal-label { font-family: 'Space Mono', monospace; font-size: 0.45rem; color: rgba(255,255,255,0.6); text-align: center; margin-top: 0.2rem; letter-spacing: 0.1em; text-transform: uppercase; }
  </style>
</head>
<body>
<nav style="position:fixed;z-index:100">
  <a href="dashboard.html" class="nav-logo">COSM0S</a>

<div class="nebula-layout">
  <div class="canvas-wrap">
    <canvas id="nebulaCanvas"></canvas>
    <div class="gen-badge" id="genBadge">PROCEDURALLY GENERATED · UNIQUE</div>
    <div class="nebula-overlay">
      <div>
        <div class="nebula-name-big" id="nebulaNameBig">GENERATING...</div>
        <div style="font-family:'Space Mono',monospace;font-size:0.55rem;color:rgba(255,255,255,0.35);margin-top:0.3rem;" id="nebulaTypeBig"></div>
      </div>
      <div class="nebula-coords" id="nebCoords"></div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-title">// NEBULA FORGE v2.1</div>

    <div class="ctrl-group">
      <span class="ctrl-label">Nebula Type</span>
      <div class="ctrl-row">
        <button class="ctrl-btn active" data-type="emission" onclick="setType('emission',this)">Emission</button>
        <button class="ctrl-btn" data-type="planetary" onclick="setType('planetary',this)">Planetary</button>
        <button class="ctrl-btn" data-type="supernova" onclick="setType('supernova',this)">Supernova</button>
        <button class="ctrl-btn" data-type="reflection" onclick="setType('reflection',this)">Reflection</button>
        <button class="ctrl-btn" data-type="dark" onclick="setType('dark',this)">Dark</button>
        <button class="ctrl-btn" data-type="random" onclick="setType('random',this)">🎲 Random</button>
      </div>
    </div>

    <div class="ctrl-group">
      <span class="ctrl-label">Color Palette</span>
      <div class="type-palette" id="palette"></div>
    </div>

    <div class="ctrl-group">
      <span class="ctrl-label">Density</span>
      <div class="slider-wrap">
        <input type="range" id="densitySlider" min="20" max="80" value="50" oninput="updateSlider('density',this.value)">
        <div class="slider-val" id="densityVal">50%</div>
      </div>
    </div>

    <div class="ctrl-group">
      <span class="ctrl-label">Turbulence</span>
      <div class="slider-wrap">
        <input type="range" id="turbSlider" min="1" max="10" value="5" oninput="updateSlider('turb',this.value)">
        <div class="slider-val" id="turbVal">5</div>
      </div>
    </div>

    <div class="ctrl-group">
      <span class="ctrl-label">Star Density</span>
      <div class="slider-wrap">
        <input type="range" id="starsSlider" min="50" max="500" value="200" oninput="updateSlider('stars',this.value)">
        <div class="slider-val" id="starsVal">200 stars</div>
      </div>
    </div>

    <button class="big-gen-btn" onclick="generate()">⚡ NEW NEBULA</button>
    <button class="save-btn" onclick="saveImage()">⬇ SAVE AS PNG</button>

    <div class="ctrl-group nebula-stats" id="nebulaStats"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('nebulaCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  const wrap = canvas.parentElement;
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}
resize();
window.addEventListener('resize', () => { resize(); generate(); });

let config = {
  type: 'emission',
  palette: 0,
  density: 50,
  turb: 5,
  stars: 200
};

const palettes = [
  { name:'Crimson', cols:['#ff2200','#ff6644','#ffaa00','#ff0066','#440000'] },
  { name:'Teal Void', cols:['#00ffcc','#0088ff','#00ffaa','#004488','#001122'] },
  { name:'Violet Storm', cols:['#9b4dff','#ff44ff','#4400cc','#ff88ff','#220066'] },
  { name:'Solar Flare', cols:['#ffcc00','#ff8800','#ff4400','#ffff44','#441100'] },
  { name:'Ice Nebula', cols:['#aaeeff','#4488ff','#88ffff','#224488','#001133'] },
  { name:'Rose Cloud', cols:['#ff44aa','#ff8888','#ffaabb','#cc2266','#330011'] },
  { name:'Cosmic Jade', cols:['#44ff88','#00cc66','#88ffcc','#006633','#001a0d'] },
  { name:'Stellar Gold', cols:['#ffd700','#ffaa44','#ffe88a','#cc8800','#332200'] },
  { name:'Deep Nebula', cols:['#6600ff','#0066ff','#ff0099','#003388','#110022'] },
];

// Build palette swatches
const palDiv = document.getElementById('palette');
palettes.forEach((p,i) => {
  const grad = `linear-gradient(135deg,${p.cols[0]},${p.cols[2]},${p.cols[4]})`;
  palDiv.innerHTML += `
    <div>
      <div class="pal-swatch ${i===0?'active':''}" style="background:${grad}" onclick="setPalette(${i},this)" title="${p.name}"></div>
      <div class="pal-label">${p.name}</div>
    </div>`;
});

function setPalette(i, el) {
  config.palette = i;
  document.querySelectorAll('.pal-swatch').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  generate();
}
function setType(t, btn) {
  config.type = t;
  document.querySelectorAll('.ctrl-btn[data-type]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  generate();
}
function updateSlider(key, val) {
  if(key==='density') { config.density=+val; document.getElementById('densityVal').textContent=val+'%'; }
  if(key==='turb') { config.turb=+val; document.getElementById('turbVal').textContent=val; }
  if(key==='stars') { config.stars=+val; document.getElementById('starsVal').textContent=val+' stars'; }
  generate();
}

const nebulaNames = [
  'NGC','IC','Messier','Sh2','GUM','RCW','LMC','SMC','HII'
];
const adjectives = ['Horsehead','Eagle','Crab','Orion','Pillars','Lagoon','Trifid','Helix','Ring','Butterfly','Eskimo','Cat Eye','Boomerang','Pelican','Flame','Veil','Witch Head','Running Man','Rosette','Omega'];

function randName() {
  const catalog = nebulaNames[Math.floor(Math.random()*nebulaNames.length)];
  const num = Math.floor(Math.random()*7000)+100;
  const adj = adjectives[Math.floor(Math.random()*adjectives.length)];
  return { id:`${catalog} ${num}`, name: `${adj} Nebula` };
}

function noise(x,y,seed){
  const n = Math.sin(x*127.1+y*311.7+seed)*43758.5453;
  return n - Math.floor(n);
}

function fbm(x,y,seed,octaves=6){
  let v=0, amp=0.5, freq=1, max=0;
  for(let i=0;i<octaves;i++){
    v += noise(x*freq,y*freq,seed+i*13.7)*amp;
    max+=amp; amp*=0.5; freq*=2.1;
  }
  return v/max;
}

function generate() {
  const W=canvas.width, H=canvas.height;
  const seed = Math.random()*1000;
  const pal = palettes[config.palette];
  const type = config.type==='random' ? ['emission','planetary','supernova','reflection','dark'][Math.floor(Math.random()*5)] : config.type;
  const density = config.density/100;
  const turb = config.turb/5;
  const stars = config.stars;

  ctx.clearRect(0,0,W,H);

  // Deep space background
  ctx.fillStyle='#000000';
  ctx.fillRect(0,0,W,H);

  // Nebula rendering via imageData for performance
  const imgData = ctx.createImageData(W, H);
  const data = imgData.data;
  const cx=W/2, cy=H/2;

  for(let y=0;y<H;y++) {
    for(let x=0;x<W;x++) {
      const nx = (x-cx)/(W*0.5);
      const ny = (y-cy)/(H*0.5);
      let density_field = 0;

      if(type==='emission') {
        // Irregular billowing clouds
        const d = Math.sqrt(nx*nx+ny*ny);
        const warp_x = nx + fbm(nx*0.8,ny*0.8,seed)*turb*0.6;
        const warp_y = ny + fbm(nx*0.8+5.2,ny*0.8+1.3,seed)*turb*0.6;
        density_field = fbm(warp_x*1.2,warp_y*1.2,seed+42) * density;
        density_field *= Math.max(0, 1 - d*0.7);
        density_field += fbm(nx*2+10,ny*2+10,seed+100)*0.15*density;

      } else if(type==='planetary') {
        // Concentric rings with warping
        const d = Math.sqrt(nx*nx*1.2+ny*ny);
        const angle = Math.atan2(ny,nx);
        const warp = fbm(nx,ny,seed)*turb*0.3;
        const r = d + warp;
        density_field = Math.max(0,
          Math.exp(-Math.pow(r-0.3,2)*25) * 0.8 +
          Math.exp(-Math.pow(r-0.55,2)*40) * 0.5 +
          Math.exp(-Math.pow(r-0.75,2)*30) * 0.3
        ) * density * 1.4;

      } else if(type==='supernova') {
        // Filamentary shock wave
        const d = Math.sqrt(nx*nx+ny*ny);
        const angle = Math.atan2(ny,nx);
        const warp = fbm(nx*2,ny*2,seed)*turb*0.5;
        const r = d + warp;
        const shell = Math.exp(-Math.pow(r-0.7,2)*15) * 0.9;
        const inner = fbm(nx*3,ny*3,seed+77)*0.4;
        density_field = (shell + inner*(1-d)) * density * 1.3;

      } else if(type==='reflection') {
        // Bright core with sweeping filaments
        const d = Math.sqrt(nx*nx+ny*ny);
        const glow = Math.exp(-d*d*3) * 0.8;
        const fil = fbm(nx+ny*0.5,ny-nx*0.5,seed)*turb*0.5;
        density_field = (glow + fil*Math.exp(-d*1.5)) * density;

      } else if(type==='dark') {
        // Dark pillar-like absorption features on starfield
        const warp_x = nx + fbm(nx,ny,seed)*turb*0.4;
        const warp_y = ny + fbm(nx+3.1,ny+2.7,seed)*turb*0.4;
        density_field = fbm(warp_x*1.5,warp_y*1.5,seed) * density * 0.7;
      }

      const idx = (y*W+x)*4;
      if(density_field > 0.05) {
        const t = Math.min(1, density_field);
        // Sample from palette
        const ci = Math.floor(fbm(nx*0.5+0.1,ny*0.5+0.2,seed+200)*4.99);
        const col = hexToRgb(pal.cols[ci]);
        const col2 = hexToRgb(pal.cols[(ci+1)%5]);
        const mix = fbm(nx*2,ny*2,seed+300);

        data[idx]   = ((col.r*(1-mix)+col2.r*mix)*t) | 0;
        data[idx+1] = ((col.g*(1-mix)+col2.g*mix)*t) | 0;
        data[idx+2] = ((col.b*(1-mix)+col2.b*mix)*t) | 0;
        data[idx+3] = (t * 220) | 0;
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);

  // Glow passes
  ctx.globalCompositeOperation = 'screen';
  for(let pass=0;pass<3;pass++){
    const gr = ctx.createRadialGradient(
      W*(0.3+Math.random()*0.4), H*(0.3+Math.random()*0.4), 0,
      W*0.5, H*0.5, W*0.45
    );
    const c1 = pal.cols[Math.floor(Math.random()*5)];
    const c2 = pal.cols[Math.floor(Math.random()*5)];
    gr.addColorStop(0, c1+'30');
    gr.addColorStop(0.5, c2+'12');
    gr.addColorStop(1, 'transparent');
    ctx.fillStyle = gr;
    ctx.fillRect(0,0,W,H);
  }
  ctx.globalCompositeOperation = 'source-over';

  // Stars
  for(let i=0;i<stars;i++){
    const sx = Math.random()*W, sy = Math.random()*H;
    const sr = Math.random()*1.8;
    const brightness = Math.random();
    const starColor = brightness>0.95 ? '#ffffff' : brightness>0.8 ? '#aaddff' : '#ffffff66';
    ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2);
    ctx.fillStyle = starColor; ctx.fill();
    // Bright star cross
    if(brightness > 0.96) {
      ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth=0.5;
      ctx.beginPath(); ctx.moveTo(sx-sr*6,sy); ctx.lineTo(sx+sr*6,sy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx,sy-sr*6); ctx.lineTo(sx,sy+sr*6); ctx.stroke();
    }
  }

  // Protostar glow in center
  if(type !== 'dark') {
    const pcx = W*(0.4+Math.random()*0.2), pcy = H*(0.4+Math.random()*0.2);
    const pg = ctx.createRadialGradient(pcx,pcy,0,pcx,pcy,50);
    pg.addColorStop(0,'rgba(255,255,255,0.9)');
    pg.addColorStop(0.2,pal.cols[0]+'80');
    pg.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.arc(pcx,pcy,50,0,Math.PI*2);
    ctx.fillStyle=pg; ctx.fill();
    // Core
    ctx.beginPath(); ctx.arc(pcx,pcy,3,0,Math.PI*2);
    ctx.fillStyle='white'; ctx.fill();
  }

  // Update UI
  const info = randName();
  document.getElementById('nebulaNameBig').textContent = info.name;
  document.getElementById('nebulaTypeBig').textContent = `${info.id} · ${type.charAt(0).toUpperCase()+type.slice(1)} Nebula`;
  const ra = (Math.random()*24).toFixed(2), dec = ((Math.random()-0.5)*180).toFixed(1);
  const dist = (Math.floor(Math.random()*8000)+200);
  document.getElementById('nebCoords').innerHTML = `RA ${ra}h · DEC ${dec}° <br>~${dist} LY FROM EARTH`;

  const typeDescs = {
    emission:'Gas ionized by nearby stars — glowing from within like a cosmic neon sign.',
    planetary:'Shell of gas expelled by a dying star. The star\'s last breath, made beautiful.',
    supernova:'Shockwave from a stellar explosion — the death scream of a massive star, visible for 1,000 years.',
    reflection:'Dust cloud lit by nearby stars — a cosmic mirror, scattering blue light.',
    dark:'Dense dust blocking background light — a shadow nebula, hiding new star formation.'
  };

  document.getElementById('nebulaStats').innerHTML = `
    <div class="sidebar-title" style="margin-bottom:0.8rem">// SPECTROGRAPHIC DATA</div>
    ${[
      ['Designation',info.id],
      ['Type',type.charAt(0).toUpperCase()+type.slice(1)+' Nebula'],
      ['Distance',dist+' LY'],
      ['Palette',pal.name],
      ['Seed',seed.toFixed(0)],
    ].map(([k,v])=>`<div class="nstat"><span class="nsk">${k}</span><span class="nsv">${v}</span></div>`).join('')}
    <div style="margin-top:0.8rem;font-size:0.72rem;color:var(--muted);line-height:1.6;">${typeDescs[type]||''}</div>
  `;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function saveImage() {
  const link = document.createElement('a');
  link.download = 'nebula-cosm0s.png';
  link.href = canvas.toDataURL();
  link.click();
}

generate();

// Keyboard shortcut
document.addEventListener('keydown', e => { if(e.code==='Space'){ e.preventDefault(); generate(); } });
</script>
</body>
</html>
